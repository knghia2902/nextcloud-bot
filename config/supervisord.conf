[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
silent=false
loglevel=info

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# Web Management Interface - Start this first
[program:web-management]
command=python3 /app/web_management.py
directory=/app
user=root
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/app/logs/web.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
environment=TZ="Asia/Ho_Chi_Minh"
priority=100

# Nextcloud Bot Main Process - Start after web interface
[program:nextcloud-bot]
command=python3 /app/send_nextcloud_message.py
directory=/app
user=root
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/app/logs/bot.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
environment=TZ="Asia/Ho_Chi_Minh"
priority=200
