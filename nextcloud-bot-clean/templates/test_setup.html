<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1>Test Setup JavaScript</h1>
        
        <div class="card">
            <div class="card-body">
                <h5>Test AJAX Load Step Content</h5>
                <button id="test-load" class="btn btn-primary">Load Step 1</button>
                <div id="result" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-body">
                <h5>Debug Info</h5>
                <div id="debug"></div>
            </div>
        </div>
    </div>

    <script>
    $(document).ready(function() {
        console.log('Test page loaded');
        console.log('jQuery version:', $.fn.jquery);
        $('#debug').html('<p>jQuery loaded: ' + (typeof $ !== 'undefined') + '</p><p>jQuery version: ' + $.fn.jquery + '</p>');

        // Test basic button click
        $('#test-load').click(function() {
            console.log('Test button clicked');
            $('#result').html('<div class="alert alert-info">Button clicked! Testing AJAX...</div>');

            // Test simple AJAX
            $.ajax({
                url: '/api/test/nextcloud',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    url: 'https://ncl.khacnghia.xyz',
                    username: 'bot_user',
                    password: 'Hpc!@#123456'
                }),
                timeout: 10000,
                success: function(data) {
                    console.log('AJAX Success:', data);
                    $('#result').html('<div class="alert alert-success">AJAX Success! Response: ' + JSON.stringify(data) + '</div>');
                },
                error: function(xhr, status, error) {
                    console.error('AJAX Error:', status, error, xhr.responseText);
                    $('#result').html('<div class="alert alert-danger">AJAX Error: ' + status + ' - ' + error + '<br>Response: ' + xhr.responseText + '</div>');
                }
            });
        });

        // Test if elements exist
        console.log('Button exists:', $('#test-load').length);
        console.log('Result div exists:', $('#result').length);
    });
    </script>
</body>
</html>
